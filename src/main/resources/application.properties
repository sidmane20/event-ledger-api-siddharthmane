spring.application.name=event-ledger-api

# --- H2 in-memory database (no external setup required) ---
spring.datasource.url=jdbc:h2:mem:eventledger;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
# Disable the Open-Session-In-View anti-pattern (transactions are scoped to the service layer)
spring.jpa.open-in-view=false

# --- H2 web console (browse the data at http://localhost:8080/h2-console) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Production health & info endpoints (Spring Boot Actuator) ---
# Health at /actuator/health (used by load balancers / container probes); info at /actuator/info.
# Only these two are exposed; other management endpoints stay disabled by default.
management.endpoints.web.exposure.include=health,info
management.info.env.enabled=true
info.app.name=Event Ledger API
info.app.version=v1
